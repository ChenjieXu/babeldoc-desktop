site_name: BabelDOC Desktop
site_description: 保留版式的智能 PDF 翻译桌面工作台
site_url: !ENV [READTHEDOCS_CANONICAL_URL, "https://babeldoc-desktop.readthedocs.io/"]
repo_url: https://github.com/ChenjieXu/babeldoc-desktop
repo_name: ChenjieXu/babeldoc-desktop
edit_uri: edit/master/docs/

theme:
  name: material
  language: zh
  logo: assets/logo.png
  favicon: assets/logo.png
  font: false
  palette:
    - scheme: default
      primary: blue
      accent: orange
      toggle:
        icon: material/weather-night
        name: 切换到深色模式
    - scheme: slate
      primary: blue
      accent: orange
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色模式
  features:
    - content.code.copy
    - navigation.footer
    - navigation.indexes
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest

nav:
  - 文档首页: index.md
  - 快速开始: getting-started.md
  - 模型与设置: configuration.md
  - 翻译工作流: translation.md
  - 常见问题: troubleshooting.md
  - 安全与隐私: security.md
  - 开发指南: development.md
  - 维护者发布: RELEASING.md

plugins:
  - search:
      lang:
        - zh
        - en

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

copyright: Copyright &copy; BabelDOC Desktop contributors · AGPL-3.0-only
